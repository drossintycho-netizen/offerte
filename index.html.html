<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Offerte Builder — Philippo Flowers</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#8B1A1A;--red2:#A82020;--cream:#FAF6F2;--cream2:#F0E8DF;--border:#D0C0AE;--text:#231008;--muted:#7A6050;--auto:#FFFAE5}
body{font-family:Arial,Helvetica,sans-serif;font-size:13px;background:#B8B0A8;height:100vh;overflow:hidden;color:var(--text)}
.wrap{display:flex;height:100vh}
.sidebar{width:390px;flex-shrink:0;display:flex;flex-direction:column;background:var(--cream);border-right:1px solid var(--border);overflow:hidden}
.ph-head{background:var(--red);padding:10px 15px 11px;flex-shrink:0}
.ph-brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ph-brand img{width:44px;height:44px;flex-shrink:0}
.ph-brand-txt .n1{font-size:14px;font-weight:900;color:#fff;line-height:1}
.ph-brand-txt .n2{font-size:9px;color:rgba(255,255,255,.6);font-style:italic;margin-top:2px}
.ph-tabs{display:flex;gap:5px}
.ph-tab{flex:1;padding:7px 4px;border:1px solid rgba(255,255,255,.3);border-radius:4px;cursor:pointer;font-size:10.5px;font-weight:700;background:transparent;color:rgba(255,255,255,.8)}
.ph-tab.active{background:#fff;color:var(--red);border-color:#fff}
.key-banner{background:#FFF8E6;border-bottom:1px solid #F0D080;padding:10px 14px;flex-shrink:0;display:none}
.key-banner.show{display:block}
.key-banner-ttl{font-size:11.5px;font-weight:700;color:#5A3800;margin-bottom:6px}
.key-row{display:flex;gap:6px}
.key-row input{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:monospace;background:#fff}
.key-row button{padding:6px 11px;background:var(--red);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11.5px;font-weight:700}
.key-note{font-size:10px;color:var(--muted);margin-top:5px}
.key-note a{color:var(--red);font-weight:700;text-decoration:none}
.key-ok{background:#EAF5EA;border-bottom:1px solid #A0CCA0;padding:7px 14px;flex-shrink:0;display:none;font-size:11px;color:#1A4A1A;align-items:center;gap:6px}
.key-ok.show{display:flex}
.key-ok button{margin-left:auto;background:none;border:none;cursor:pointer;font-size:10px;color:var(--muted);text-decoration:underline;padding:0}
.asec{background:var(--cream2);border-bottom:1px solid var(--border);padding:10px 14px;flex-shrink:0}
.asec-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.asec-hdr-l{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--red)}
.adot{width:8px;height:8px;background:#E8541A;border-radius:50%;flex-shrink:0}
.aarrow{font-size:10px;color:var(--muted);transition:transform .2s}
.aarrow.open{transform:rotate(180deg)}
.asec-inner{display:none;margin-top:9px}
.asec-inner.open{display:block}
.ast-tabs{display:flex;gap:5px;margin-bottom:8px}
.ast{flex:1;padding:6px 4px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:11px;font-weight:700;background:transparent;color:var(--muted)}
.ast.active{background:var(--red);color:#fff;border-color:var(--red)}
.mail-ta{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:4px;font-size:11.5px;font-family:Arial,sans-serif;background:#fff;resize:vertical;min-height:75px;max-height:130px;color:var(--text)}
.mail-ta:focus{outline:none;border-color:var(--red)}
.bon-area{border:2px dashed var(--border);border-radius:5px;padding:14px;text-align:center;cursor:pointer;background:#fff;transition:border-color .15s}
.bon-area:hover{border-color:var(--red)}
.bon-area-icon{font-size:22px;margin-bottom:4px}
.bon-area-txt{font-size:12px;color:var(--muted)}
.bon-preview{margin-top:7px}
.analyse-row{display:flex;gap:7px;margin-top:8px;align-items:center}
.analyse-btn{padding:7px 13px;background:var(--red);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11.5px;font-weight:700;flex-shrink:0}
.analyse-btn:disabled{opacity:.5;cursor:default}
.wis-btn{padding:7px 10px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:11px;margin-left:auto}
.aresult{margin-top:7px;font-size:11px;padding:7px 9px;border-radius:4px}
.aresult.ok{background:#EAF4EA;border:1px solid #A3CCA3;color:#1A4A1A}
.aresult.warn{background:#FFF8E6;border:1px solid #F9CA6A;color:#5A3800;margin-top:5px}
.aresult.err{background:#FEECEC;border:1px solid #F5A0A0;color:#6A0000}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.sb-body{flex:1;overflow-y:auto;padding:11px 14px}
.fsec{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid var(--red);padding-bottom:3px;margin:14px 0 8px}
.fsec:first-child{margin-top:0}
.f{margin-bottom:7px}
.f label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.f input,.f textarea,.f select{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:Arial,sans-serif;background:#fff;color:var(--text);outline:none;transition:border-color .15s}
.f input:focus,.f textarea:focus,.f select:focus{border-color:var(--red)}
.f textarea{resize:vertical}
.f input.af,.f textarea.af{background:var(--auto);border-color:#E8B800}
.frow{display:flex;gap:6px}
.pcard{background:#fff;border:1px solid var(--border);border-left:3px solid var(--red);border-radius:4px;padding:9px 11px;margin-bottom:7px}
.pcard-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.pcard-lbl{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px}
.pcard-lbl.af-lbl::after{content:'auto';font-size:9px;background:#E8B800;color:#5A3800;padding:1px 4px;border-radius:3px;margin-left:5px;font-weight:700;text-transform:uppercase}
.rbtn{background:none;border:none;cursor:pointer;color:#c0392b;font-size:20px;line-height:1;padding:0;opacity:.7}
.rbtn:hover{opacity:1}
.addbtn{width:100%;padding:7px;border:2px dashed var(--border);border-radius:4px;color:var(--red);background:transparent;cursor:pointer;font-size:11px;font-weight:700;margin-bottom:5px}
.addbtn:hover{border-color:var(--red)}
.ht{font-size:10px;color:var(--muted);text-align:right;margin-top:-4px;margin-bottom:3px}
.chkrow{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text);margin-bottom:7px;cursor:pointer}
.chkrow input{cursor:pointer;accent-color:var(--red)}
.foto-bar{display:flex;align-items:center;gap:8px;margin-top:5px}
.foto-add{font-size:10.5px;color:var(--red);cursor:pointer;text-decoration:underline;background:none;border:none;padding:0}
.foto-del{font-size:10px;color:#c0392b;cursor:pointer;text-decoration:underline;background:none;border:none;padding:0;margin-left:4px}
.foto-thumb{max-height:48px;max-width:90px;border:1px solid var(--border);border-radius:3px}
.sb-foot{padding:11px 14px;border-top:1px solid var(--border);flex-shrink:0;background:var(--cream2)}
.printbtn{width:100%;padding:11px;background:var(--red);color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:700}
.printbtn:hover{background:var(--red2)}
.pv-area{flex:1;overflow-y:auto;background:#B8B0A8;padding:20px;display:flex;flex-direction:column;align-items:center}
.a4{width:730px;background:#fff;padding:45px 50px 56px;box-shadow:0 4px 24px rgba(0,0,0,.3);margin-bottom:20px;min-height:1030px;font-family:Arial,sans-serif;font-size:11.5px;line-height:1.55;color:#222}
.pv-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.pv-comp{font-size:11px;margin-top:6px;line-height:1.55}
.pv-kl{text-align:right;font-size:11px;line-height:1.55}
.pv-ot{font-size:25px;font-weight:900;color:#8B1A1A;margin-bottom:5px}
.pv-m{font-size:11px;margin-bottom:2px}
.pv-div{border:none;border-top:2px solid #111;margin:13px 0}
.pv-body p{margin-bottom:7px}
.pv-ph{font-weight:700;font-size:12px;margin-top:14px;margin-bottom:3px}
.pv-prod-img{max-width:220px;max-height:160px;margin:6px 0 8px;border:1px solid #eee;display:block}
.pv-cl{margin-top:26px}
.pv-cl p{margin-bottom:4px;font-size:11.5px}
.pv-ft{margin-top:50px;border-top:1px solid #ccc;padding-top:8px;display:flex;justify-content:flex-end}
.zt{width:100%;border-collapse:collapse;font-size:10.5px;margin-bottom:12px}
.zt th{background:#8B1A1A;color:#fff;padding:5px 8px;text-align:left;border:1px solid #8B1A1A}
.zt td{padding:4px 8px;border:1px solid #ddd}
.zt .r{text-align:right}.zt .c{text-align:center}
.zt .rb td{background:#f8f8f8}
.zt .rt td{background:#ebebeb;font-weight:700}
.zgrand{margin-top:11px;padding:9px 13px;border-left:4px solid #8B1A1A;background:#fef9f5;font-size:11.5px}
@media print{
  .sidebar{display:none!important}
  .wrap,.pv-area{display:block!important}
  .pv-area{background:#fff!important;padding:0!important;overflow:visible!important}
  .a4{box-shadow:none!important;margin:0!important;width:100%!important;padding:16mm 20mm!important;min-height:unset!important}
  body{background:#fff!important;height:auto!important;overflow:auto!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}
</style>
</head>

const VEST={
  Kalmthout:'Dorpsstraat 55, 2920 Kalmthout',
  Antwerpen:'Pelikaanstraat 3 / 1630 Pand 4, 2018 Antwerpen',
  Ekeren:'Steenstraat 22, 2180 Ekeren',
  Geel:'Nieuwstraat 36, 2440 Geel'
};
let mode='reg',pid=0,aid=0,aTab='mail',bonFile=null,aOpen=true;
const pN=v=>parseFloat(v)||0;
const fmt=v=>'€'+(pN(v).toFixed(2));
const efi=(i,p)=>pN(i)/(1+pN(p)/100);
const ife=(e,p)=>pN(e)*(1+pN(p)/100);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const td=()=>{const d=new Date();return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`};
const mkReg=()=>({offerteNr:'',datum:td(),vestiging:'Kalmthout',klantNaam:'',klantBedrijf:'',klantAdres:'',intro:'Hartelijk dank voor uw aanvraag. Graag bezorgen wij u hierbij onze offerte.',producten:[],heeftLint:false,lint:{beschrijving:'',prijsInclBTW:'',btw:'21'},heeftLevering:false,levering:{datum:'',adres:'',prijsInclBTW:'',btw:'6'},totaalOmschrijving:'',afzender:'Janneke Van Esbroeck',_af:{}});
const mkZorg=()=>({offerteNr:'',datum:td(),aangevraagdDoor:'',wzcNaam:'',artikelen6:[],heeftLevering:true,leveringPrijsExcl:'9.434',artikelen21:[],_af:{}});
let S={reg:mkReg(),zorg:mkZorg()};

function getKey(){return localStorage.getItem('ph_k')||'';}
function checkKeyUI(){const k=getKey();document.getElementById('key-banner').className='key-banner'+(k?'':' show');document.getElementById('key-ok').className='key-ok'+(k?' show':'');}
function saveKey(){const v=document.getElementById('key-inp').value.trim();if(!v.startsWith('sk-')){alert('Ongeldige sleutel (moet beginnen met sk-)');return;}localStorage.setItem('ph_k',v);checkKeyUI();}
function resetKey(){if(confirm('API-sleutel verwijderen?')){localStorage.removeItem('ph_k');document.getElementById('key-inp').value='';checkKeyUI();}}

function toggleAnalyse(){aOpen=!aOpen;document.getElementById('asec-inner').className='asec-inner'+(aOpen?' open':'');document.getElementById('aarrow').className='aarrow'+(aOpen?' open':'');}
function setATab(t){aTab=t;document.getElementById('ast-mail').className='ast'+(t==='mail'?' active':'');document.getElementById('ast-bon').className='ast'+(t==='bon'?' active':'');document.getElementById('panel-mail').style.display=t==='mail'?'block':'none';document.getElementById('panel-bon').style.display=t==='bon'?'block':'none';}
function switchTab(t){mode=t;document.getElementById('tab-reg').className='ph-tab'+(t==='reg'?' active':'');document.getElementById('tab-zorg').className='ph-tab'+(t==='zorg'?' active':'');render();}
function previewBon(e){const f=e.target.files[0];if(!f)return;bonFile=f;const p=document.getElementById('bon-preview');if(f.type.startsWith('image/')){const r=new FileReader();r.onload=ev=>{p.innerHTML=`<img src="${ev.target.result}" style="max-height:80px;max-width:100%;margin-top:7px;border:1px solid #ddd;border-radius:3px;display:block"><div style="font-size:10.5px;color:var(--muted);margin-top:3px">${esc(f.name)}</div>`;};r.readAsDataURL(f);}else{p.innerHTML=`<div style="padding:7px 9px;background:#f0f0f0;border-radius:4px;margin-top:7px;font-size:11.5px">&#128196; ${esc(f.name)}</div>`;}}

function fld(lbl,val,id,type='text',ph='',af=false){return `<div class="f"><label>${lbl}</label><input type="${type}" id="${id}" value="${esc(val)}" placeholder="${ph}"${af?' class="af"':''}></div>`;}
function fta(lbl,val,id,rows=2,af=false){return `<div class="f"><label>${lbl}</label><textarea id="${id}" rows="${rows}"${af?' class="af"':''}>${esc(val)}</textarea></div>`;}
function fsel(lbl,val,id,opts){return `<div class="f"><label>${lbl}</label><select id="${id}">${opts.map(o=>`<option value="${o.v}"${o.v==val?' selected':''}>${o.l}</option>`).join('')}</select></div>`;}
const bOpts=[{v:'6',l:'6%'},{v:'21',l:'21%'}];
const vOpts=Object.keys(VEST).map(k=>({v:k,l:k}));

function buildRegForm(){
  const r=S.reg,af=r._af||{};
  let h=`<div class="fsec">Basisgegevens</div>`;
  h+=`<div class="frow"><div style="flex:1">${fld('Offerte nr.',r.offerteNr,'f-nr','text','OFF-2026-...')}</div><div style="flex:1">${fld('Datum',r.datum,'f-dt')}</div></div>`;
  h+=`<div class="frow"><div style="flex:1">${fsel('Vestiging',r.vestiging,'f-vest',vOpts)}</div><div style="flex:1">${fld('Afzender',r.afzender,'f-afz')}</div></div>`;
  h+=`<div class="fsec">Klantgegevens</div>`;
  h+=fld('Naam klant',r.klantNaam,'f-kn','text','',af.klantNaam)+fld('Bedrijf / Organisatie',r.klantBedrijf,'f-kb','text','',af.klantBedrijf)+fld('Adres klant',r.klantAdres,'f-ka','text','',af.klantAdres);
  h+=`<div class="fsec">Inleiding</div>`+fta('',r.intro,'f-intro',2,af.intro);
  h+=`<div class="fsec">Producten</div>`;
  r.producten.forEach((p,i)=>{
    const isAf=p._af||false;
    const ex=p.prijsInclBTW?`<div class="ht">Per stuk excl ${p.btw}%: ${fmt(efi(p.prijsInclBTW,p.btw))}</div>`:'';
    const fotoBar=`<div class="foto-bar"><button class="foto-add" onclick="trigFoto('${p.id}')">&#128247; ${p.foto?'Foto wijzigen':'Foto toevoegen'}</button>${p.foto?`<img src="${p.foto}" class="foto-thumb"><button class="foto-del" onclick="delFoto('${p.id}')">&#10005; Verwijder</button>`:''}</div><input type="file" id="foto-${p.id}" accept="image/*" style="display:none" onchange="upFoto(event,'${p.id}')">`;
    h+=`<div class="pcard"><div class="pcard-hdr"><span class="pcard-lbl${isAf?' af-lbl':''}">Product ${i+1}</span><button class="rbtn" onclick="remProd('${p.id}')">&#215;</button></div>${fld('Naam / Titel',p.naam,'pn-'+p.id,'text','',isAf)}${fta('Beschrijving',p.beschrijving,'pd-'+p.id,2,isAf)}<div class="frow"><div style="flex:0 0 66px">${fld('Stuks',p.stuks,'ps-'+p.id,'number')}</div><div style="flex:2">${fld('Prijs/stuk incl BTW (€)',p.prijsInclBTW,'pp-'+p.id,'number')}</div><div style="flex:0 0 64px">${fsel('BTW%',p.btw,'pb-'+p.id,bOpts)}</div></div>${ex}${fotoBar}</div>`;
  });
  h+=`<button class="addbtn" onclick="addProd()">+ Product toevoegen</button>`;
  h+=`<div class="fsec">Accessoire / Lint</div><label class="chkrow"><input type="checkbox" id="f-hl"${r.heeftLint?' checked':''}> Accessoire / lint toevoegen</label>`;
  if(r.heeftLint)h+=`<div class="pcard">${fta('Beschrijving',r.lint.beschrijving,'fl-b',2)}<div class="frow"><div style="flex:2">${fld('Prijs incl BTW (€)',r.lint.prijsInclBTW,'fl-p','number')}</div><div style="flex:0 0 64px">${fsel('BTW%',r.lint.btw,'fl-btw',bOpts)}</div></div></div>`;
  h+=`<div class="fsec">Levering</div><label class="chkrow"><input type="checkbox" id="f-hlev"${r.heeftLevering?' checked':''}> Levering toevoegen</label>`;
  if(r.heeftLevering)h+=`<div class="pcard">${fld('Leveringsdatum',r.levering.datum,'flv-d','text','',af.leveringDatum)}${fta('Leveringsadres',r.levering.adres,'flv-a',2,af.leveringAdres)}<div class="frow"><div style="flex:2">${fld('Prijs levering incl BTW (€)',r.levering.prijsInclBTW,'flv-p','number')}</div><div style="flex:0 0 64px">${fsel('BTW%',r.levering.btw,'flv-btw',bOpts)}</div></div></div>`;
  h+=`<div class="fsec">Totaalregel</div>`+fta('Omschrijving totaal',r.totaalOmschrijving,'f-tom',2,af.totaalOmschrijving);
  return h;
}

function buildZorgForm(){
  const z=S.zorg,af=z._af||{};
  let h=`<div class="fsec">Basisgegevens</div>`;
  h+=`<div class="frow"><div style="flex:1">${fld('Offerte nr.',z.offerteNr,'z-nr','text','OFF-2026-...')}</div><div style="flex:1">${fld('Datum',z.datum,'z-dt')}</div></div>`;
  h+=fld('Aangevraagd door',z.aangevraagdDoor,'z-door','text','',af.aangevraagdDoor)+fld('Offerte voor (WZC naam)',z.wzcNaam,'z-wzc','text','WZC ...',af.wzcNaam);
  h+=`<div class="fsec">Artikelen — 6% BTW</div>`;
  z.artikelen6.forEach((a,i)=>{
    const tot=pN(a.stuks)*pN(a.prijsExcl),hi=a.prijsExcl?`<div class="ht">Totaal: ${fmt(tot)} excl &#8594; ${fmt(ife(tot,6))} incl</div>`:'';
    h+=`<div class="pcard"><div class="pcard-hdr"><span class="pcard-lbl${a._af?' af-lbl':''}">Artikel ${i+1} (6%)</span><button class="rbtn" onclick="remA6('${a.id}')">&#215;</button></div>${fld('Artikelnaam',a.naam,'a6n-'+a.id,'text','',a._af)}<div class="frow"><div style="flex:0 0 66px">${fld('Stuks',a.stuks,'a6s-'+a.id,'number')}</div><div style="flex:2">${fld('Prijs/stuk excl BTW (€)',a.prijsExcl,'a6p-'+a.id,'number')}</div></div>${hi}</div>`;
  });
  h+=`<button class="addbtn" onclick="addA6()">+ Artikel toevoegen (6%)</button>`;
  h+=`<label class="chkrow"><input type="checkbox" id="z-hl"${z.heeftLevering?' checked':''}> Levering inbegrepen (6% BTW)</label>`;
  if(z.heeftLevering)h+=fld('Leveringsprijs excl BTW (€)',z.leveringPrijsExcl,'z-levp','number');
  h+=`<div class="fsec">Artikelen — 21% BTW</div>`;
  z.artikelen21.forEach((a,i)=>{
    const tot=pN(a.stuks)*pN(a.prijsExcl),hi=a.prijsExcl?`<div class="ht">Totaal: ${fmt(tot)} excl &#8594; ${fmt(ife(tot,21))} incl</div>`:'';
    h+=`<div class="pcard"><div class="pcard-hdr"><span class="pcard-lbl${a._af?' af-lbl':''}">Artikel ${i+1} (21%)</span><button class="rbtn" onclick="remA21('${a.id}')">&#215;</button></div>${fld('Artikelnaam',a.naam,'a21n-'+a.id,'text','',a._af)}<div class="frow"><div style="flex:0 0 66px">${fld('Stuks',a.stuks,'a21s-'+a.id,'number')}</div><div style="flex:2">${fld('Prijs/stuk excl BTW (€)',a.prijsExcl,'a21p-'+a.id,'number')}</div></div>${hi}</div>`;
  });
  h+=`<button class="addbtn" onclick="addA21()">+ Artikel toevoegen (21%)</button>`;
  return h;
}

function renderPreview(){if(mode==='reg')renderRegPreview();else renderZorgPreview();}
function render(){
  const sb=document.getElementById('sb-body');
  sb.innerHTML=mode==='reg'?buildRegForm():buildZorgForm();
  if(mode==='reg')bindReg();else bindZorg();
  renderPreview();
}

const SYS='Je bent offerte-assistent voor Philippo Flowers. Analyseer mail of bestelbon. Antwoord UITSLUITEND met geldige JSON, geen markdown, geen uitleg.';
const APROMPT=`Analyseer en geef JSON:
{
  "modus": "regulier" of "zorgbedrijf",
  "klantNaam": string of null,
  "klantBedrijf": string of null,
  "klantAdres": string of null,
  "vestiging": "Kalmthout"/"Antwerpen"/"Ekeren"/"Geel" of null,
  "intro": "openingszin voor offerte",
  "heeftLevering": boolean,
  "leveringDatum": "DD/MM/YYYY" of null,
  "leveringAdres": string of null,
  "totaalOmschrijving": string,
  "aangevraagdDoor": null,
  "wzcNaam": null,
  "producten": [{"naam":"string","beschrijving":"string","stuks":1,"btw":"6","prijsInclBTW":""}],
  "opmerkingen": "wat manueel aangevuld moet worden (prijzen, ...)"
}
Regels: prijsInclBTW is ALTIJD "". btw: bloemen/planten/levering="6", accessoires/potgrond/linten="21". Maak een apart object per product. stuks = vermeld aantal of 1.`;

function fileToB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}

async function analyseData(){
  const mailTxt=document.getElementById('mail-ta').value.trim();
  if(aTab==='mail'&&!mailTxt){showRes('Plak eerst een mail in het tekstvak.','err');return;}
  if(aTab==='bon'&&!bonFile){showRes('Upload eerst een bestelbon.','err');return;}
  const k=getKey();if(!k){showRes('Stel eerst je API-sleutel in (zie bovenaan).','err');return;}
  const btn=document.getElementById('abtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>Analyseren...';
  document.getElementById('ares').innerHTML='';
  try{
    let messages;
    if(aTab==='bon'&&bonFile){
      const b64=await fileToB64(bonFile);
      const isPDF=bonFile.type==='application/pdf';
      const ci=isPDF?{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}}:{type:'image',source:{type:'base64',media_type:bonFile.type,data:b64}};
      messages=[{role:'user',content:[ci,{type:'text',text:APROMPT}]}];
    }else{
      messages=[{role:'user',content:APROMPT+'\n\nMail:\n'+mailTxt}];
    }
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,system:SYS,messages})});
    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||'Fout '+resp.status);}
    const data=await resp.json();
    let txt=data.content[0].text.trim().replace(/```json|```/g,'').trim();
    applyData(JSON.parse(txt));
  }catch(e){showRes('Fout: '+e.message,'err');}
  finally{btn.disabled=false;btn.innerHTML='Analyseer';}
}

function applyData(j){
  if(j.modus==='zorgbedrijf')mode='zorgbedrijf';else mode='reg';
  document.getElementById('tab-reg').className='ph-tab'+(mode==='reg'?' active':'');
  document.getElementById('tab-zorg').className='ph-tab'+(mode==='zorg'?' active':'');
  const af={};
  const prods=j.producten||[];
  if(mode==='reg'){
    const r=S.reg;
    if(j.klantNaam){r.klantNaam=j.klantNaam;af.klantNaam=true;}
    if(j.klantBedrijf){r.klantBedrijf=j.klantBedrijf;af.klantBedrijf=true;}
    if(j.klantAdres){r.klantAdres=j.klantAdres;af.klantAdres=true;}
    if(j.intro){r.intro=j.intro;af.intro=true;}
    if(j.vestiging&&VEST[j.vestiging])r.vestiging=j.vestiging;
    if(j.heeftLevering){r.heeftLevering=true;if(j.leveringDatum){r.levering.datum=j.leveringDatum;af.leveringDatum=true;}if(j.leveringAdres){r.levering.adres=j.leveringAdres;af.leveringAdres=true;}}
    if(j.totaalOmschrijving){r.totaalOmschrijving=j.totaalOmschrijving;af.totaalOmschrijving=true;}
    prods.forEach(p=>{r.producten.push({id:++pid,naam:p.naam||'',beschrijving:p.beschrijving||'',stuks:String(p.stuks||1),prijsInclBTW:'',btw:p.btw||'6',foto:null,_af:true});});
    r._af=af;
  }else{
    const z=S.zorg;
    if(j.aangevraagdDoor){z.aangevraagdDoor=j.aangevraagdDoor;af.aangevraagdDoor=true;}
    if(j.wzcNaam){z.wzcNaam=j.wzcNaam;af.wzcNaam=true;}
    prods.forEach(p=>{const a={id:++aid,naam:p.naam||'',stuks:String(p.stuks||1),prijsExcl:'',_af:true};if(p.btw==='21')z.artikelen21.push(a);else z.artikelen6.push(a);});
    z._af=af;
  }
  render();
  const fc=Object.keys(af).length;
  let msg=`<div class="aresult ok">&#10004; <strong>${fc} veld${fc!==1?'en':''}</strong> en <strong>${prods.length} product${prods.length!==1?'en':''}</strong> ingevuld${j.klantNaam?' voor '+esc(j.klantNaam):''}. Vul nog de prijzen in.</div>`;
  if(j.opmerkingen)msg+=`<div class="aresult warn">&#9888; <strong>Nog aanvullen:</strong> ${esc(j.opmerkingen)}</div>`;
  document.getElementById('ares').innerHTML=msg;
}

function showRes(msg,type){document.getElementById('ares').innerHTML=`<div class="aresult ${type}">${msg}</div>`;}

checkKeyUI();
render();

</script>
